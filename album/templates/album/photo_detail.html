{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
    <div class="text-center">

        <h2 class="mb-3">{{ photo.name }}</h2>

        <img src="{{ photo.image.url }}"
             class="img-fluid rounded shadow mb-3"
             style="max-height: 600px;"
             loading="lazy">

        <p class="text-muted mb-1">
            Uploaded: {{ photo.uploaded_at|date:"Y-m-d H:i" }}
        </p>

        <p class="text-muted mb-3">
            By: {{ photo.owner.username }}
        </p>

        <div class="d-flex justify-content-center gap-2 mt-3">

            {% if user == photo.owner or user.is_staff %}
                <a href="#"
                class="btn btn-danger"
                id="delete-detail"
                data-url="{% url 'photo_delete' photo.pk %}?next={{ next|urlencode }}">
                    Delete
                </a>
            {% endif %}

            <a href="{{ next|default:'/' }}"
               class="btn btn-secondary">
               Back to Gallery
            </a>

        </div>

    </div>
</div>

<script>
document.getElementById("delete-detail")?.addEventListener("click", function(e) {
    e.preventDefault();

    const url = this.dataset.url;
    const next = "{{ next|default:'/' }}";

    fetch(url, { method: "GET" }).then(res => {
        if (res.ok) {
            window.location.href = next;
        }
    });
});
</script>
{% endblock %}
